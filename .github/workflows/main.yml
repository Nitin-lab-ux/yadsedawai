name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # 1. Node 18 use karenge taaki 'bob' wala npm bug na aaye
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      # 2. Expo ka official action (Yeh EAS CLI automatically install karega)
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      # 3. Normal install (Bina kisi ignore-scripts ke)
      - name: Install dependencies
        run: cd yaad-se-dawai && npm install
        
      # 4. Final Build Command
      - name: Build APK
        run: cd yaad-se-dawai && eas build --platform android --profile preview --non-interactive --no-wait
